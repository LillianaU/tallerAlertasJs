<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller de Alertas JS - Menú SPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #7589eb 0%, #3a1083 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --dark-bg: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #e94560;
            --text-light: #2a143a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--dark-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-light);
        }

        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 300px;
            min-width: 300px;
            height: 100%;
            background: var(--card-bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        }

        .sidebar.hidden {
            transform: translateX(-100%);
            position: absolute;
        }

        .sidebar-header {
            background: var(--primary-gradient);
            padding: 1.5rem;
            text-align: center;
            position: relative;
            flex-shrink: 0;
        }

        .sidebar-header h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .sidebar-header small {
            color: rgba(255,255,255,0.8);
        }

        .close-sidebar {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: none;
        }

        .menu-accordion {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem 0;
        }

        .accordion-item {
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .accordion-button {
            background: transparent !important;
            color: var(--text-light) !important;
            border: none !important;
            padding: 1rem 1.5rem;
            width: 100%;
            text-align: left;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: none !important;
        }

        .accordion-button::after {
            display: none;
        }

        .accordion-button:hover {
            background: rgba(255,255,255,0.05) !important;
        }

        .accordion-button:not(.collapsed) {
            background: var(--primary-gradient) !important;
        }

        .accordion-button i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }

        .accordion-button .icon-chevron {
            transition: transform 0.3s ease;
            font-size: 0.8rem;
        }

        .accordion-button:not(.collapsed) .icon-chevron {
            transform: rotate(180deg);
        }

        .accordion-collapse {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .accordion-collapse.show {
            max-height: 500px;
        }

        .accordion-body {
            background: rgba(0,0,0,0.2);
            padding: 0;
        }

        .accordion-body a {
            display: block;
            padding: 0.8rem 1.5rem 0.8rem 3.5rem;
            color: var(--text-light);
            text-decoration: none;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .accordion-body a:hover {
            background: rgba(255,255,255,0.1);
            border-left-color: var(--accent-color);
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .navbar {
            background: var(--primary-gradient);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .menu-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .menu-toggle:hover {
            opacity: 0.8;
        }

        .menu-toggle .list-icon {
            display: none;
        }

        .navbar-brand {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .content-area {
            flex: 1;
            padding: 1rem;
            overflow: hidden;
            background: var(--dark-bg);
        }

        .page-frame {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
            background: #fff;
            overflow: hidden;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                transform: translateX(-100%);
                width: 85%;
                max-width: 300px;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .sidebar.hidden {
                transform: translateX(-100%);
            }

            .menu-toggle .bars-icon {
                display: none;
            }

            .menu-toggle .list-icon {
                display: inline-block;
            }

            .close-sidebar {
                display: block;
            }

            .accordion-body a {
                padding-left: 2.5rem;
            }

            .content-area {
                padding: 0.5rem;
            }
        }

        .section-icon {
            width: 24px;
            text-align: center;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="app-container">
        <aside class="sidebar hidden" id="sidebar">
            <div class="sidebar-header">
                <button class="close-sidebar" id="closeSidebar">
                    <i class="fas fa-times"></i>
                </button>
                <i class="fas fa-bell fa-2x mb-2"></i>
                <h2>Taller Alertas JS</h2>
                <small>SweetAlert2 Workshop</small>
            </div>

            <div class="menu-accordion">
                <div class="accordion" id="menuAccordion">
                    <div class="accordion-item">
                        <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#collapseIntro">
                            <span><i class="fas fa-book section-icon"></i> Introducción</span>
                            <i class="fas fa-chevron-down icon-chevron"></i>
                        </button>
                        <div id="collapseIntro" class="accordion-collapse collapse show" data-bs-parent="#menuAccordion">
                            <div class="accordion-body">
                                <a href="#" data-page="Introducción_Teorica.html"><i class="fas fa-file-alt me-2"></i>Teoría Básica</a>
                            </div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#collapseLabs">
                            <span><i class="fas fa-flask section-icon"></i>Laboratorios</span>
                            <i class="fas fa-chevron-down icon-chevron"></i>
                        </button>
                        <div id="collapseLabs" class="accordion-collapse collapse show" data-bs-parent="#menuAccordion">
                            <div class="accordion-body">
                                <a href="#" data-page="ElAlmacendeCadenas.html"><i class="fas fa-link me-2"></i>El Almacén de Cadenas</a>
                                <a href="#" data-page="LaFruteriaAsíncrona.html"><i class="fas fa-clock me-2"></i>La Frutería Asíncrona</a>
                                <a href="#" data-page="El Inicio de Sesión Reactivo.html"><i class="fas fa-sign-in-alt me-2"></i>Inicio de Sesión Reactivo</a>
                                <a href="#" data-page="Encuestador_de_Datos_Compuestos.html"><i class="fas fa-poll me-2"></i>Encuestador de Datos</a>
                                <a href="#" data-page="ejercicio5-artefacto-universal.html"><i class="fas fa-mobile-alt me-2"></i>Artefacto Universal</a>
                            </div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#collapseRecursos">
                            <span><i class="fas fa-star section-icon"></i>Recursos</span>
                            <i class="fas fa-chevron-down icon-chevron"></i>
                        </button>
                        <div id="collapseRecursos" class="accordion-collapse collapse" data-bs-parent="#menuAccordion">
                            <div class="accordion-body">
                                <a href="#" onclick="showAbout()"><i class="fas fa-info-circle me-2"></i>Acerca de</a>
                                <a href="#" onclick="openGitHub()"><i class="fas fa-github me-2"></i>GitHub</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <div class="main-wrapper">
            <nav class="navbar">
                <button class="menu-toggle" id="menuToggle">
                    <span class="bars-icon"><i class="fas fa-bars"></i></span>
                    <span class="list-icon"><i class="fas fa-list"></i></span>
                    <span>Menú</span>
                </button>
                <span class="navbar-brand"><i class="fas fa-bell me-2"></i>Taller de Alertas JS</span>
            </nav>

            <div class="content-area">
                <iframe class="page-frame" id="pageFrame" src=" Introducción_Teorica.html"></iframe>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        const closeSidebar = document.getElementById('closeSidebar');
        const pageFrame = document.getElementById('pageFrame');
        const menuLinks = document.querySelectorAll('.accordion-body a');

        function isMobile() {
            return window.innerWidth <= 768;
        }

        function openSidebar() {
            sidebar.classList.add('active');
            sidebar.classList.remove('hidden');
            menuOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebarFunc() {
            sidebar.classList.remove('active');
            menuOverlay.classList.remove('active');
            document.body.style.overflow = '';
            
            if (isMobile()) {
                setTimeout(() => {
                    sidebar.classList.add('hidden');
                }, 300);
            }
        }

        menuToggle.addEventListener('click', () => {
            if (sidebar.classList.contains('active')) {
                closeSidebarFunc();
            } else {
                openSidebar();
            }
        });

        closeSidebar.addEventListener('click', closeSidebarFunc);
        menuOverlay.addEventListener('click', closeSidebarFunc);

        menuLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const page = link.dataset.page;
                closeSidebarFunc();
                loadPage(page);
            });
        });

        function loadPage(page) {
            pageFrame.src = page;
        }

        function showAbout() {
            closeSidebarFunc();
            Swal.fire({
                title: '<span style="color: #667eea;">Taller de Alertas JS</span>',
                html: `
                    <div style="text-align: left; padding: 10px;">
                        <p><i class="fas fa-bell" style="color: #e94560;"></i> <strong>SweetAlert2 Workshop</strong></p>
                        <hr style="border-color: rgba(255,255,255,0.1);">
                        <p style="font-size: 14px; color: #a0a0a0;">
                            Aprende a crear alertas modernas y personalizadas<br>
                            utilizando el patrón de <strong>Method Chaining</strong>
                        </p>
                        <div style="margin-top: 15px;">
                            <span class="badge bg-primary me-1">JavaScript</span>
                            <span class="badge bg-success me-1">SweetAlert2</span>
                            <span class="badge bg-warning text-dark">Bootstrap</span>
                        </div>
                    </div>
                `,
                icon: 'info',
                confirmButtonText: '¡Entendido!',
                confirmButtonColor: '#667eea',
                background: '#16213e',
                color: '#eaeaea'
            });
        }

        function openGitHub() {
            closeSidebarFunc();
            Swal.fire({
                title: '¿Visitar GitHub?',
                text: 'Serás redirigido al repositorio del taller',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'Sí, ir a GitHub',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#667eea',
                cancelButtonColor: '#e94560',
                background: '#16213e',
                color: '#eaeaea'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.open('https://github.com/anomalyco/tallerAlertasJs', '_blank');
                }
            });
        }

        document.querySelectorAll('.accordion-button').forEach(button => {
            button.addEventListener('click', function() {
                const chevron = this.querySelector('.icon-chevron');
                if (this.classList.contains('collapsed')) {
                    chevron.style.transform = 'rotate(0deg)';
                } else {
                    chevron.style.transform = 'rotate(180deg)';
                }
            });
        });

        window.addEventListener('resize', () => {
            if (!isMobile()) {
                sidebar.classList.remove('hidden');
                menuOverlay.classList.remove('active');
            } else {
                if (!sidebar.classList.contains('active')) {
                    sidebar.classList.add('hidden');
                }
            }
        });

        if (!isMobile()) {
            sidebar.classList.remove('hidden');
        }
    </script>
</body>
</html>
