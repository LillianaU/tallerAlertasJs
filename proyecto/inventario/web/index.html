<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Inventario Pro</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
        }
        
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .navbar-brand {
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        .stat-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-icon {
            font-size: 2.5rem;
            opacity: 0.8;
        }
        
        .table-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .product-img {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .badge-stock {
            font-size: 0.9em;
            padding: 0.5em 0.8em;
        }
        
        .search-box {
            position: relative;
        }
        
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #6c757d;
        }
        
        .search-box input {
            padding-left: 40px;
            border-radius: 25px;
            border: 2px solid #e9ecef;
        }
        
        .search-box input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }
        
        .btn-action {
            border-radius: 20px;
            padding: 0.375rem 1rem;
        }
        
        .price-tag {
            font-weight: 600;
            color: #198754;
        }
        
        .original-price {
            text-decoration: line-through;
            color: #6c757d;
            font-size: 0.85em;
        }
        
        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="#">
                <i class="bi bi-box-seam me-2"></i>
                Sistema de Inventario Pro
            </a>
            <span class="navbar-text text-light opacity-75">
                v1.0.0 | Procesamiento de Datos Avanzado
            </span>
        </div>
    </nav>

    <div class="container-fluid py-4 px-4">
        <!-- Header y Controles -->
        <div class="row mb-4 align-items-center">
            <div class="col-md-6">
                <h2 class="mb-0 text-dark">
                    <i class="bi bi-grid-3x3-gap me-2 text-primary"></i>
                    Dashboard de Productos
                </h2>
                <p class="text-muted mb-0 mt-1">Gestión de inventario en tiempo real</p>
            </div>
            <div class="col-md-6">
                <div class="search-box">
                    <i class="bi bi-search"></i>
                    <input type="text" id="searchInput" class="form-control form-control-lg" 
                           placeholder="Buscar productos por nombre, categoría...">
                </div>
            </div>
        </div>

        <!-- Tarjetas de Estadísticas (Generadas dinámicamente) -->
        <div id="statsContainer" class="row g-4 mb-4">
            <!-- Se inyecta via JavaScript -->
        </div>

        <!-- Tabla de Productos -->
        <div class="table-container p-4 animate-fade-in">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">
                    <i class="bi bi-table me-2"></i>
                    Listado de Productos
                </h5>
                <div class="btn-group">
                    <button class="btn btn-outline-primary btn-sm" onclick="ordenarPor('nombre')">
                        <i class="bi bi-sort-alpha-down me-1"></i> Nombre
                    </button>
                    <button class="btn btn-outline-primary btn-sm" onclick="ordenarPor('precio')">
                        <i class="bi bi-sort-numeric-down me-1"></i> Precio
                    </button>
                    <button class="btn btn-outline-success btn-sm" onclick="exportarDatos()">
                        <i class="bi bi-download me-1"></i> Exportar
                    </button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="productTable">
                    <thead class="table-light">
                        <tr>
                            <th class="border-0">Producto</th>
                            <th class="border-0">Categoría</th>
                            <th class="border-0 text-end">Precio Original</th>
                            <th class="border-0 text-end">Precio Final</th>
                            <th class="border-0 text-center">Stock</th>
                            <th class="border-0 text-center">Estado</th>
                            <th class="border-0 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Datos inyectados dinámicamente -->
                    </tbody>
                </table>
            </div>
            
            <div id="noResults" class="text-center py-5 text-muted" style="display: none;">
                <i class="bi bi-inbox display-4"></i>
                <p class="mt-3">No se encontraron productos</p>
            </div>
        </div>
    </div>

    <!-- Modal de Edición -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">
                        <i class="bi bi-pencil-square me-2"></i>
                        Editar Producto
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editForm">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre del Producto</label>
                            <input type="text" class="form-control" id="editNombre" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Precio</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" class="form-control" id="editPrecio" step="0.01" required>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Stock</label>
                                <input type="number" class="form-control" id="editStock" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Categoría</label>
                            <select class="form-select" id="editCategoria">
                                <option value="Computación">Computación</option>
                                <option value="Periféricos">Periféricos</option>
                                <option value="Monitores">Monitores</option>
                                <option value="Audio">Audio</option>
                                <option value="Cámaras">Cámaras</option>
                                <option value="Tablets">Tablets</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="guardarEdicion()">
                        <i class="bi bi-check-lg me-1"></i>
                        Guardar Cambios
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
