<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Datos - Taller JS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --accent: #e94560;
            --success: #00b894;
            --warning: #fdcb6e;
            --dark: #0f0f1a;
            --dark-card: #1a1a2e;
            --dark-card-2: #16213e;
            --light: #eaeaea;
            --text-muted: #a0a0a0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
        }
        .header-bg {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .stats-card {
            background: var(--dark-card);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            transition: transform 0.3s;
        }
        .stats-card:hover { transform: translateY(-5px); }
        .stats-number {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--success));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
        .search-box { background: var(--dark-card); border-radius: 16px; padding: 1rem; }
        .search-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--light);
            border-radius: 30px;
            padding: 0.8rem 1.5rem;
        }
        .search-input:focus {
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
            color: var(--light);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.2);
            outline: none;
        }
        .data-card {
            background: var(--dark-card-2);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
            height: 100%;
        }
        .data-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-color: var(--primary);
        }
        .card-category { padding: 1rem 1.25rem; background: rgba(0,0,0,0.2); }
        .category-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
        }
        .badge-js { background: rgba(247, 223, 30, 0.2); color: #f7df1e; }
        .badge-texto { background: rgba(74, 158, 255, 0.2); color: #4a9eff; }
        .badge-binario { background: rgba(255, 107, 107, 0.2); color: #ff6b6b; }
        .badge-node { background: rgba(104, 160, 99, 0.2); color: #68a063; }
        .card-id {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .card-body-custom { padding: 1.25rem; }
        .term-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.75rem; }
        .description-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            background: rgba(255,255,255,0.03);
            padding: 0.75rem;
            border-radius: 8px;
        }
        .card-actions {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .btn-action {
            flex: 1;
            border: none;
            border-radius: 8px;
            padding: 0.6rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-view { background: var(--primary); color: white; }
        .btn-edit { background: rgba(253, 203, 110, 0.2); color: var(--warning); }
        .btn-edit:hover { background: rgba(253, 203, 110, 0.4); }
        .btn-delete { background: rgba(233, 69, 96, 0.2); color: var(--accent); }
        .btn-delete:hover { background: rgba(233, 69, 96, 0.4); }
        .btn-action:hover { transform: translateY(-2px); }
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            padding: 0.75rem 1.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4); }
        .table-container { background: var(--dark-card-2); border-radius: 16px; overflow: hidden; }
        .custom-table { width: 100%; margin: 0; color: var(--light); }
        .custom-table thead { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .custom-table th { padding: 1rem; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; border: none; }
        .custom-table td { padding: 0.75rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .custom-table tbody tr:hover { background: rgba(102, 126, 234, 0.08); }
        .modal-content-custom { background: var(--dark-card-2); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .modal-header-custom {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 20px 20px 0 0;
            padding: 1.25rem;
        }
        .form-control-custom {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--light);
            border-radius: 10px;
            padding: 0.75rem;
        }
        .form-control-custom:focus {
            background: rgba(255,255,255,0.1);
            border-color: var(--primary);
            color: var(--light);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            outline: none;
        }
        .nav-pills-custom .nav-link {
            color: var(--text-muted);
            border-radius: 25px;
            padding: 0.5rem 1rem;
        }
        .nav-pills-custom .nav-link.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-muted); }
        .empty-state i { font-size: 4rem; opacity: 0.2; margin-bottom: 1rem; }
        @media (max-width: 768px) {
            .stats-card, .data-card { margin-bottom: 1rem; }
        }
    </style>
</head>
<body>

<header class="header-bg text-center">
    <div class="container">
        <h1 class="mb-2"><i class="fas fa-database me-2"></i>Tipos de Datos</h1>
        <p class="mb-0 opacity-75">CRUD de JavaScript Intermedio II</p>
        <button class="btn btn-sm btn-warning mt-2" onclick="resetearDatos()">
            <i class="fas fa-redo me-1"></i> Reiniciar Datos
        </button>
    </div>
</header>

<div class="container pb-5">
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="stats-card">
                <div class="stats-number" id="totalRegistros">0</div>
                <div class="stats-label">Total</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stats-card">
                <div class="stats-number" id="totalJS">0</div>
                <div class="stats-label">JS</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stats-card">
                <div class="stats-number" id="totalTexto">0</div>
                <div class="stats-label">Texto</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="stats-card">
                <div class="stats-number" id="totalBinario">0</div>
                <div class="stats-label">Binario/CLI</div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-8">
            <div class="search-box">
                <input type="text" class="form-control search-input" id="buscador" placeholder="Buscar...">
            </div>
        </div>
        <div class="col-md-4">
            <div class="search-box">
                <select class="form-select form-control-custom" id="filtroCategoria">
                    <option value="todas">Todas las categorías</option>
                    <option value="JS Intermedio II">JS Intermedio II</option>
                    <option value="Formatos Texto">Formatos Texto</option>
                    <option value="Formatos Binario">Formatos Binario</option>
                    <option value="Node.js / CLI">Node.js / CLI</option>
                </select>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <ul class="nav nav-pills-custom nav-pills">
            <li class="nav-item"><a class="nav-link active" href="#" data-view="cards"><i class="fas fa-th-large me-1"></i>Tarjetas</a></li>
            <li class="nav-item"><a class="nav-link" href="#" data-view="table"><i class="fas fa-table me-1"></i>Tabla</a></li>
        </ul>
        <button class="btn-primary-custom" onclick="mostrarModalAgregar()">
            <i class="fas fa-plus me-1"></i> Nuevo
        </button>
    </div>

    <div class="row g-4" id="cardsView"></div>

    <div class="table-container d-none" id="tableView">
        <table class="table custom-table">
            <thead>
                <tr><th>#</th><th>Categoría</th><th>Término</th><th>Aplicabilidad</th><th>Acciones</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="verModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content modal-content-custom">
            <div class="modal-header-custom">
                <h5 class="modal-title text-white" id="verModalTitle"></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4" id="verModalBody"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content modal-content-custom">
            <div class="modal-header border-secondary">
                <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Editar / Crear</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="editForm">
                    <input type="hidden" id="editId">
                    <div class="mb-3">
                        <label class="form-label">Categoría</label>
                        <select class="form-select form-control-custom" id="editCategoria" required>
                            <option value="JS Intermedio II">JS Intermedio II</option>
                            <option value="Formatos Texto">Formatos Texto</option>
                            <option value="Formatos Binario">Formatos Binario</option>
                            <option value="Node.js / CLI">Node.js / CLI</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Término</label>
                        <input type="text" class="form-control form-control-custom" id="editTermino" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Aplicabilidad</label>
                        <textarea class="form-control form-control-custom" id="editAplicabilidad" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary-custom w-100">
                        <i class="fas fa-save me-1"></i> Guardar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
const STORAGE_KEY = 'tipos_datos_crud';

const iconos = {
    'JS Intermedio II': { icon: 'fab fa-js', class: 'badge-js', color: '#f7df1e' },
    'Formatos Texto': { icon: 'fas fa-file-alt', class: 'badge-texto', color: '#4a9eff' },
    'Formatos Binario': { icon: 'fas fa-file-code', class: 'badge-binario', color: '#ff6b6b' },
    'Node.js / CLI': { icon: 'fab fa-node-js', class: 'badge-node', color: '#68a063' }
};

let datos = [];

const datosIniciales = [
    { id: 1, categoria: "JS Intermedio II", termino: ".map(), .filter(), .reduce()", aplicabilidad: "Generar reportes financieros, filtros de busqueda y transformacion de precios." },
    { id: 2, categoria: "JS Intermedio II", termino: "Destructuring & Spread", aplicabilidad: "Manejar el estado del formulario de forma limpia y segura." },
    { id: 3, categoria: "Formatos Texto", termino: "YAML / TOML", aplicabilidad: "Archivos de configuracion de la App (colores del tema, roles de acceso)." },
    { id: 4, categoria: "Formatos Texto", termino: "CSV / XML", aplicabilidad: "Importacion masiva de datos desde Excel o sistemas contables antiguos." },
    { id: 5, categoria: "Formatos Binario", termino: "MessagePack / BSON", aplicabilidad: "Guardar datos en el almacenamiento local ocupando el minimo espacio posible." },
    { id: 6, categoria: "Formatos Binario", termino: "Protobuf / Avro", aplicabilidad: "Definir reglas estrictas para que no falte ningun campo obligatorio en el registro." },
    { id: 7, categoria: "Node.js / CLI", termino: "fs & Buffer", aplicabilidad: "Lectura directa de archivos del sistema y manejo de datos crudos." }
];

async function cargarDatosDesdeJSON() {
    try {
        const response = await fetch('data/tipos_datos.json');
        if (response.ok) {
            const datosJSON = await response.json();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(datosJSON));
            return datosJSON;
        }
    } catch(e) {
        console.log('No se pudo cargar JSON, usando datos por defecto');
    }
    
    const datosGuardados = localStorage.getItem(STORAGE_KEY);
    if (datosGuardados) {
        return JSON.parse(datosGuardados);
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(datosIniciales));
    return [...datosIniciales];
}

function guardarDatos(datos) {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(datos));
    } catch(e) {
        console.error('Error guardando datos:', e);
    }
}

cargarDatosDesdeJSON().then(datosIniciales => {
    datos = datosIniciales;
    actualizarEstadisticas();
    buscarDatos();
});

function actualizarEstadisticas() {
    document.getElementById('totalRegistros').textContent = datos.length;
    document.getElementById('totalJS').textContent = datos.filter(d => d.categoria === 'JS Intermedio II').length;
    document.getElementById('totalTexto').textContent = datos.filter(d => d.categoria === 'Formatos Texto').length;
    document.getElementById('totalBinario').textContent = datos.filter(d => d.categoria === 'Formatos Binario' || d.categoria === 'Node.js / CLI').length;
}

function renderizarCards(datosFiltrados) {
    const container = document.getElementById('cardsView');
    if (datosFiltrados.length === 0) {
        container.innerHTML = '<div class="empty-state col-12"><i class="fas fa-search"></i><h4>No se encontraron registros</h4></div>';
        return;
    }
    container.innerHTML = datosFiltrados.map(d => {
        const info = iconos[d.categoria] || { icon: 'fas fa-question', class: 'badge-js', color: '#fff' };
        return `
        <div class="col-md-6 col-lg-4">
            <div class="data-card">
                <div class="card-category">
                    <span class="category-badge ${info.class}"><i class="${info.icon}"></i>${d.categoria}</span>
                    <span class="card-id">${d.id}</span>
                </div>
                <div class="card-body-custom">
                    <h5 class="term-title"><i class="${info.icon}" style="color:${info.color}"></i> ${d.termino}</h5>
                    <p class="description-text">${d.aplicabilidad}</p>
                </div>
                <div class="card-actions">
                    <button class="btn-action btn-view" data-id="${d.id}"><i class="fas fa-eye"></i> Ver</button>
                    <button class="btn-action btn-edit" data-id="${d.id}"><i class="fas fa-edit"></i> Editar</button>
                    <button class="btn-action btn-delete" data-id="${d.id}"><i class="fas fa-trash"></i> Eliminar</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function renderizarTabla(datosFiltrados) {
    const tbody = document.getElementById('tableBody');
    if (datosFiltrados.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center">No se encontraron registros</td></tr>';
        return;
    }
    tbody.innerHTML = datosFiltrados.map(d => {
        const info = iconos[d.categoria] || { icon: 'fas fa-question', class: 'badge-js', color: '#fff' };
        return `
        <tr>
            <td><span class="card-id">${d.id}</span></td>
            <td><span class="category-badge ${info.class}">${d.categoria}</span></td>
            <td><strong>${d.termino}</strong></td>
            <td>${d.aplicabilidad.substring(0, 50)}...</td>
            <td>
                <button class="btn btn-sm btn-info me-1 btn-view" data-id="${d.id}"><i class="fas fa-eye"></i></button>
                <button class="btn btn-sm btn-warning me-1 btn-edit" data-id="${d.id}"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-danger btn-delete" data-id="${d.id}"><i class="fas fa-trash"></i></button>
            </td>
        </tr>`;
    }).join('');
}

function buscarDatos() {
    const termino = document.getElementById('buscador').value.toLowerCase();
    const categoria = document.getElementById('filtroCategoria').value;
    const resultados = datos.filter(d => {
        const coincideTexto = d.termino.toLowerCase().includes(termino) ||
            d.categoria.toLowerCase().includes(termino) ||
            d.aplicabilidad.toLowerCase().includes(termino);
        const coincideCategoria = categoria === 'todas' || d.categoria === categoria;
        return coincideTexto && coincideCategoria;
    });
    renderizarCards(resultados);
    renderizarTabla(resultados);
}

document.getElementById('buscador').addEventListener('input', buscarDatos);
document.getElementById('filtroCategoria').addEventListener('change', buscarDatos);

document.addEventListener('click', function(e) {
    const btn = e.target.closest('button');
    if (!btn) return;
    
    const id = parseInt(btn.dataset.id);
    if (!id) return;
    
    if (btn.classList.contains('btn-view')) {
        verDato(id);
    } else if (btn.classList.contains('btn-edit')) {
        editarDato(id);
    } else if (btn.classList.contains('btn-delete')) {
        eliminarDato(id);
    }
});

function verDato(id) {
    const dato = datos.find(d => d.id === id);
    if (!dato) return;
    
    const info = iconos[dato.categoria] || { icon: 'fas fa-question', class: 'badge-js', color: '#fff' };
    document.getElementById('verModalTitle').innerHTML = `<i class="${info.icon}" style="color:${info.color}"></i> ${dato.termino}`;
    document.getElementById('verModalBody').innerHTML = `
        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="p-3 bg-light bg-opacity-10 rounded">
                    <h6><i class="fas fa-tag me-2"></i>Categoría</h6>
                    <p class="mb-0"><span class="category-badge ${info.class}">${dato.categoria}</span></p>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="p-3 bg-light bg-opacity-10 rounded">
                    <h6><i class="fas fa-hashtag me-2"></i>ID</h6>
                    <p class="mb-0">#${dato.id}</p>
                </div>
            </div>
            <div class="col-12 mb-3">
                <div class="p-3 bg-light bg-opacity-10 rounded">
                    <h6><i class="fas fa-align-left me-2"></i>Término</h6>
                    <p class="mb-0 fw-bold">${dato.termino}</p>
                </div>
            </div>
            <div class="col-12">
                <div class="p-3 bg-light bg-opacity-10 rounded">
                    <h6><i class="fas fa-project-diagram me-2"></i>Aplicabilidad</h6>
                    <p class="mb-0">${dato.aplicabilidad}</p>
                </div>
            </div>
        </div>`;
    new bootstrap.Modal(document.getElementById('verModal')).show();
}

function mostrarModalAgregar() {
    document.getElementById('editId').value = Math.max(0, ...datos.map(d => d.id)) + 1;
    document.getElementById('editCategoria').value = 'JS Intermedio II';
    document.getElementById('editTermino').value = '';
    document.getElementById('editAplicabilidad').value = '';
    new bootstrap.Modal(document.getElementById('editModal')).show();
}

function editarDato(id) {
    const dato = datos.find(d => d.id === id);
    if (!dato) return;
    document.getElementById('editId').value = dato.id;
    document.getElementById('editCategoria').value = dato.categoria;
    document.getElementById('editTermino').value = dato.termino;
    document.getElementById('editAplicabilidad').value = dato.aplicabilidad;
    new bootstrap.Modal(document.getElementById('editModal')).show();
}

document.getElementById('editForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const id = parseInt(document.getElementById('editId').value);
    const categoria = document.getElementById('editCategoria').value;
    const termino = document.getElementById('editTermino').value;
    const aplicabilidad = document.getElementById('editAplicabilidad').value;
    const index = datos.findIndex(d => d.id === id);
    
    if (index >= 0) {
        datos[index] = { id, categoria, termino, aplicabilidad };
        Swal.fire({ title: '✓ Actualizado', text: 'Registro actualizado', icon: 'success', background: '#1a1a2e', color: '#eaeaea' });
    } else {
        datos.push({ id, categoria, termino, aplicabilidad });
        Swal.fire({ title: '✓ Creado', text: 'Nuevo registro agregado', icon: 'success', background: '#1a1a2e', color: '#eaeaea' });
    }
    
    guardarDatos(datos);
    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
    buscarDatos();
    actualizarEstadisticas();
});

function eliminarDato(id) {
    const dato = datos.find(d => d.id === id);
    Swal.fire({
        title: '¿Eliminar?',
        html: `¿Eliminar <strong>${dato.termino}</strong>?`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar',
        confirmButtonColor: '#e94560',
        background: '#1a1a2e',
        color: '#eaeaea'
    }).then(result => {
        if (result.isConfirmed) {
            datos = datos.filter(d => d.id !== id);
            guardarDatos(datos);
            buscarDatos();
            actualizarEstadisticas();
            Swal.fire({ title: '✓ Eliminado', text: 'Registro eliminado', icon: 'success', background: '#1a1a2e', color: '#eaeaea' });
        }
    });
}

document.querySelectorAll('.nav-link[data-view]').forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        this.classList.add('active');
        const view = this.dataset.view;
        if (view === 'cards') {
            document.getElementById('cardsView').classList.remove('d-none');
            document.getElementById('tableView').classList.add('d-none');
        } else {
            document.getElementById('cardsView').classList.add('d-none');
            document.getElementById('tableView').classList.remove('d-none');
        }
    });
});

function resetearDatos() {
    localStorage.removeItem(STORAGE_KEY);
    cargarDatosDesdeJSON().then(datosIniciales => {
        datos = datosIniciales;
        buscarDatos();
        actualizarEstadisticas();
        Swal.fire({ title: '✓ Reiniciado', text: 'Datos restaurados', icon: 'success', background: '#1a1a2e', color: '#eaeaea' });
    });
}
</script>
</body>
</html>
